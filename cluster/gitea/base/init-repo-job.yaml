# Job that initializes a Git repository in Gitea with the gitops-manifests.
# Waits for Gitea API to be ready, creates the repo, then pushes the manifests.
apiVersion: batch/v1
kind: Job
metadata:
  name: init-repo
  namespace: gitea
spec:
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: alpine/git:2.47.2
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              apk add --no-cache curl > /dev/null 2>&1

              GITEA_URL="http://gitea-http.gitea:3000"
              GITEA_USER="gitea"
              GITEA_PASS="gitea"
              REPO_NAME="example-02"

              # Wait for Gitea API to be ready
              echo "Waiting for Gitea API..."
              for i in $(seq 1 60); do
                if curl -sf "${GITEA_URL}/api/v1/version" > /dev/null 2>&1; then
                  echo "Gitea API is ready"
                  break
                fi
                sleep 2
              done

              # Create repository (ignore if already exists)
              echo "Creating repository ${REPO_NAME}..."
              curl -sf -X POST "${GITEA_URL}/api/v1/user/repos" \
                -u "${GITEA_USER}:${GITEA_PASS}" \
                -H "Content-Type: application/json" \
                -d "{\"name\": \"${REPO_NAME}\", \"auto_init\": true, \"default_branch\": \"main\"}" \
                > /dev/null 2>&1 || echo "Repository may already exist, continuing..."

              # Clone and push manifests
              WORK="/tmp/repo"
              rm -rf "${WORK}"
              git clone "http://${GITEA_USER}:${GITEA_PASS}@gitea-http.gitea:3000/${GITEA_USER}/${REPO_NAME}.git" "${WORK}"
              cd "${WORK}"

              git config user.name "Gitea Init"
              git config user.email "init@local.dev"

              # Copy manifests from the mounted ConfigMap
              cp /manifests/namespace.yaml .
              cp /manifests/configmap.yaml .
              cp /manifests/scaledobject.yaml .
              cp /manifests/kustomization.yaml .

              git add -A
              if git diff --cached --quiet; then
                echo "No changes to commit"
              else
                git commit -m "Initial gitops manifests for example-02"
                git push origin main
                echo "Manifests pushed to ${GITEA_URL}/${GITEA_USER}/${REPO_NAME}"
              fi
          volumeMounts:
            - name: manifests
              mountPath: /manifests
      volumes:
        - name: manifests
          configMap:
            name: gitops-manifests
