# HTTPRoute — gitea.127.0.0.1.nip.io -> gitea-http:3000
# Attaches to the shared "playground" Gateway in envoy-gateway-system.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea
  namespace: gitea
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "gitea.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: gitea-http
          port: 3000
