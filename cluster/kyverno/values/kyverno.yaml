# Kyverno v1.17.1 values for Kind playground
# Chart version: 3.7.1

# Admission controller: single replica for local dev + extra RBAC for policy examples
admissionController:
  replicas: 1
  container:
    image:
      registry: ghcr.io
      tag: ed916fa73a08d4f57b4398a42ed88f7d86d0a0ed
  initContainer:
    image:
      registry: ghcr.io
      tag: ed916fa73a08d4f57b4398a42ed88f7d86d0a0ed
  rbac:
    clusterRole: &clusterRole
      extraResources:
        # Example 02: KEDA Prometheus Address
        - apiGroups:
            - keda.sh
          resources:
            - scaledobjects
            - scaledjobs
          verbs:
            - get
            - list
            - watch
            - update
            - patch

# Background controller: single replica + extra RBAC for background mutations
backgroundController:
  replicas: 1
  image:
    registry: ghcr.io
    tag: ed916fa73a08d4f57b4398a42ed88f7d86d0a0ed
  rbac:
    clusterRole: *clusterRole

cleanupController:
  replicas: 1

reportsController:
  replicas: 1
  rbac:
    clusterRole: *clusterRole

# Extra config
config:
  resourceFiltersExcludeNamespaces: []
