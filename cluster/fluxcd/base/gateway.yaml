# HTTPRoute — flux.127.0.0.1.nip.io -> flux-operator:9080 (Flux Web UI)
# Attaches to the shared "playground" Gateway in envoy-gateway-system.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: flux-web
  namespace: flux-system
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "flux.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: flux-operator
          port: 9080
