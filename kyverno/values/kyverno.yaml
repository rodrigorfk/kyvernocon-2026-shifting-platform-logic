# Kyverno v1.17.1 values for Kind playground
# Chart version: 3.7.1

# Admission controller: single replica for local dev + extra RBAC for policy examples
admissionController:
  replicas: 1
  container:
    image:
      registry: ko.local
      repository: github.com/kyverno/kyverno/cmd/kyverno
      tag: 5b0fbc8c2cbd1abf234d165c9915bf6a41f01aa389abb10b38a1a9e665c6267d
  rbac:
    clusterRole: &clusterRole
      extraResources:
        # Example 02: KEDA Prometheus Address
        - apiGroups:
            - keda.sh
          resources:
            - scaledobjects
            - scaledjobs
          verbs:
            - get
            - list
            - watch
            - update
            - patch

# Background controller: single replica + extra RBAC for background mutations
backgroundController:
  replicas: 1
  image:
    registry: ko.local
    repository: github.com/kyverno/kyverno/cmd/background-controller
    tag: 6fc45a8f2d181ad07c155b94b9b508b0f13e19f4f4fc56cd548252f7646bd988
  rbac:
    clusterRole: *clusterRole

cleanupController:
  replicas: 1

reportsController:
  replicas: 1
  rbac:
    clusterRole: *clusterRole

# Extra config
config:
  resourceFiltersExcludeNamespaces: []
