apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: gitops-manifests
    namespace: gitea
    files:
      - namespace.yaml=../../gitops-manifests/namespace.yaml
      - configmap.yaml=../../gitops-manifests/configmap.yaml
      - scaledobject.yaml=../../gitops-manifests/scaledobject.yaml
      - kustomization.yaml=../../gitops-manifests/kustomization.yaml

resources:
  - init-repo-job.yaml
  - gateway.yaml
