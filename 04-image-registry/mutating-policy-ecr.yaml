# Migrated from: ClusterPolicy (kyverno.io/v1) rules "replace-image-registry-pod-containers-ecr"
# and "replace-image-registry-pod-init-containers-ecr" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/04-image-registry
#
# This policy handles ECR cross-region image rewriting. When a pod references an ECR image
# from a different AWS region, this policy rewrites the image URL to use the local region's
# ECR pull-through cache. The rewrite appends the "ecr-private/" prefix to the repository path,
# which maps to the configured ECR PTC rule that transparently handles cross-region fetching.
#
# Example: 
#   Input:  123456789012.dkr.ecr.us-east-1.amazonaws.com/my-app:v1
#   Output: 123456789012.dkr.ecr.eu-west-1.amazonaws.com/ecr-private/my-app:v1
#
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: 01-mutate-ecr-cross-region
spec:
  webhookConfiguration:
    timeoutSeconds: 15
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  variables:
    # Load the cluster's AWS region from ConfigMap
    - name: clusterConfig
      expression: >-
        resource.Get("v1", "configmaps", "kube-system", "cluster-config")
    - name: region
      expression: >-
        variables.clusterConfig.data["region"]
    # ECR URL pattern: {registryId}.dkr.ecr.{region}.amazonaws.com
    - name: ecrPattern
      expression: >-
        "^[0-9]+\\.dkr\\.ecr\\..+\\.amazonaws\\.com$"
    - name: localEcrSuffix
      expression: >-
        ".dkr.ecr." + variables.region + ".amazonaws.com"
    - name: repositoryPrefixesToIgnore
      expression: >-
        ["ecr-private/", "docker-hub/", "ecr-public/", "github/", "quay/", "kubernetes/"]
  mutations:
    # Rewrite ECR images from other regions to the local region (containers)
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          object.spec.containers.filter(e,
            image(e.image).registry().matches(variables.ecrPattern) &&
            !image(e.image).registry().endsWith(variables.localEcrSuffix) &&
            !variables.repositoryPrefixesToIgnore.exists(p, image(e.image).repository().startsWith(p))
          ).map(e,
            JSONPatch{
              op: "replace",
              path: "/spec/containers/" + string(object.spec.containers.indexOf(e)) + "/image",
              value:
                image(e.image).registry().split(".")[0] + variables.localEcrSuffix +
                "/ecr-private/" + image(e.image).repository() +
                (
                  image(e.image).digest() != ""
                    ? "@" + image(e.image).digest()
                    : ":" + (image(e.image).tag() != "" ? image(e.image).tag() : "latest")
                )
            }
          )
    # Same logic for initContainers
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          has(object.spec.initContainers)
          ? object.spec.initContainers.filter(e,
              image(e.image).registry().matches(variables.ecrPattern) &&
              !image(e.image).registry().endsWith(variables.localEcrSuffix) &&
              !variables.repositoryPrefixesToIgnore.exists(p, image(e.image).registry().startsWith(p))
            ).map(e,
              JSONPatch{
                op: "replace",
                path: "/spec/initContainers/" + string(object.spec.initContainers.indexOf(e)) + "/image",
                value:
                  image(e.image).registry().split(".")[0] + variables.localEcrSuffix +
                  "/ecr-private/" + image(e.image).repository() +
                  (
                    image(e.image).digest() != ""
                      ? "@" + image(e.image).digest()
                      : ":" + (image(e.image).tag() != "" ? image(e.image).tag() : "latest")
                  )
              }
            )
          : []
