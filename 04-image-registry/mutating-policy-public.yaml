# Migrated from: ClusterPolicy (kyverno.io/v1) rules "replace-image-registry-pod-containers"
# and "replace-image-registry-pod-init-containers" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/04-image-registry
#
# This policy replaces public image registries (docker.io, gcr.io, ghcr.io, quay.io,
# public.ecr.aws, registry.k8s.io) with private ECR pull-through cache alternatives.
# The mapping is stored in a ConfigMap for easy updates.
#
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: 02-mutate-public-registry-containers
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  matchConditions:
    # Only apply to pods without imagePullSecrets (those with secrets likely
    # already have private registry access configured)
    - name: no-imagepullsecrets
      expression: >-
        !has(object.spec.imagePullSecrets) ||
        object.spec.imagePullSecrets.size() == 0
  variables:
    # Load the public-to-private registry mapping from ConfigMap
    - name: registryMapping
      expression: >-
        resource.Get("v1", "configmaps", "kube-system", "public-registry-mapping")
    - name: mappingData
      expression: >-
        variables.registryMapping.data
  mutations:
    # Mutate containers: replace public registry references with private ones
    # - patchType: JSONPatch
    #   jsonPatch:
    #     expression: >-
    #       object.spec.containers.filter(e,
    #         image(e.image).registry() in variables.mappingData
    #       ).map(e,
    #         JSONPatch{
    #           op: "replace",
    #           path: "/metadata/annotations/kyverno.io~1mutate-public-registry-containers",
    #           value: "true"
    #         }
    #       )
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          object.spec.containers.filter(e,
            image(e.image).registry() in variables.mappingData
          ).map(e,
            JSONPatch{
              op: "replace",
              path: "/spec/containers/" + string(object.spec.containers.indexOf(e)) + "/image",
              value:
                variables.mappingData[image(e.image).registry()] + "/" +
                (
                  image(e.image).registry() == "docker.io" &&
                  !image(e.image).repository().contains("/")
                    ? "library/" + image(e.image).repository()
                    : image(e.image).repository()
                ) +
                (
                  image(e.image).digest() != ""
                    ? "@" + image(e.image).digest()
                    : ":" + (image(e.image).tag() != "" ? image(e.image).tag() : "latest")
                )
            }
          )
    # Mutate initContainers: same logic for init containers
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          has(object.spec.initContainers)
          ? object.spec.initContainers.filter(e,
              image(e.image).registry() in variables.mappingData
            ).map(e,
              JSONPatch{
                op: "replace",
                path: "/spec/initContainers/" + string(object.spec.initContainers.indexOf(e)) + "/image",
                value:
                  variables.mappingData[image(e.image).registry()] + "/" +
                  (
                    image(e.image).registry() == "docker.io" &&
                    !image(e.image).repository().contains("/")
                      ? "library/" + image(e.image).repository()
                      : image(e.image).repository()
                  ) +
                  (
                    image(e.image).digest() != ""
                      ? "@" + image(e.image).digest()
                      : ":" + (image(e.image).tag() != "" ? image(e.image).tag() : "latest")
                  )
              }
            )
          : []
