---
# Expected: imagePullSecret added
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-basic
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  containers:
    - name: my-app
      image: my-registry-proxy.example.com/team/my-app:v1
---
# Expected: imagePullSecret added
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-multi
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  containers:
    - name: frontend
      image: my-registry-proxy.example.com/frontend:v1
    - name: backend
      image: my-registry-proxy.example.com/backend:v2
---
# Expected: imagePullSecret added (initContainer uses private registry) and container images rewritten to private registry by other policy
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-init
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  initContainers:
    - name: setup
      image: my-registry-proxy.example.com/setup-script:v1
  containers:
    - name: app
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/nginx:latest
---
# Expected: imagePullSecret added (both init and container use private registry)
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-init-and-container
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  initContainers:
    - name: migration
      image: my-registry-proxy.example.com/db-migrate:v1
  containers:
    - name: app
      image: my-registry-proxy.example.com/app:v1
---
# Expected: no imagePullSecret added (public images only), but images rewritten to private registry by other policy
apiVersion: v1
kind: Pod
metadata:
  name: pod-public-images-only
spec:
  containers:
    - name: nginx
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/nginx:latest
    - name: postgres
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/postgres:15
---
# Expected: imagePullSecret added (mixed public and private), and public images rewritten to private registry by other policy
apiVersion: v1
kind: Pod
metadata:
  name: pod-mixed-registries
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  containers:
    - name: frontend
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/nginx:latest
    - name: backend
      image: my-registry-proxy.example.com/backend:v1
---
# Expected: imagePullSecret added as the first entry, existing secret preserved (new secret + existing secret)
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-existing-secret
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
    - name: existing-secret
  containers:
    - name: app
      image: my-registry-proxy.example.com/app:v1
---
# Expected: imagePullSecret added (init uses private registry)
apiVersion: v1
kind: Pod
metadata:
  name: pod-init-private-only
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  initContainers:
    - name: setup
      image: my-registry-proxy.example.com/setup:v1
  containers:
    - name: app
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/nginx:latest
---
# Expected: imagePullSecret added (multiple private registries)
apiVersion: v1
kind: Pod
metadata:
  name: pod-complex-private
spec:
  imagePullSecrets:
    - name: registry-proxy-private-key
  initContainers:
    - name: init1
      image: my-registry-proxy.example.com/init1:v1
    - name: init2
      image: my-registry-proxy.example.com/init2:v1
  containers:
    - name: container1
      image: my-registry-proxy.example.com/app1:v1
    - name: container2
      image: my-registry-proxy.example.com/app2:v1
    - name: container3
      image: 000.dkr.ecr.eu-west-1.amazonaws.com/docker-hub/library/nginx:latest
    - name: container4
      image: 000000000000.dkr.ecr.eu-west-1.amazonaws.com/ecr-private/web:v1