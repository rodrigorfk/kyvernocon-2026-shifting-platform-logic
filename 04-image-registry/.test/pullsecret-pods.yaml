---
# Pod using private registry proxy (single container)
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-basic
spec:
  containers:
    - name: my-app
      image: my-registry-proxy.example.com/team/my-app:v1
---
# Pod with multiple containers using private registry
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-multi
spec:
  containers:
    - name: frontend
      image: my-registry-proxy.example.com/frontend:v1
    - name: backend
      image: my-registry-proxy.example.com/backend:v2
---
# Pod with initContainer using private registry
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-init
spec:
  initContainers:
    - name: setup
      image: my-registry-proxy.example.com/setup-script:v1
  containers:
    - name: app
      image: nginx:latest
---
# Pod with both initContainer and container using private registry
apiVersion: v1
kind: Pod
metadata:
  name: pod-private-repo-init-and-container
spec:
  initContainers:
    - name: migration
      image: my-registry-proxy.example.com/db-migrate:v1
  containers:
    - name: app
      image: my-registry-proxy.example.com/app:v1
---
# Pod with no private registry images (public images only)
apiVersion: v1
kind: Pod
metadata:
  name: pod-public-images-only
spec:
  containers:
    - name: nginx
      image: nginx:latest
    - name: postgres
      image: postgres:15
---
# Pod with mixed public and private images (should still add secret)
apiVersion: v1
kind: Pod
metadata:
  name: pod-mixed-registries
spec:
  containers:
    - name: frontend
      image: nginx:latest
    - name: backend
      image: my-registry-proxy.example.com/backend:v1
---
# Pod that already has imagePullSecrets
apiVersion: v1
kind: Pod
metadata:
  name: pod-with-existing-secret
spec:
  imagePullSecrets:
    - name: existing-secret
  containers:
    - name: app
      image: my-registry-proxy.example.com/app:v1
---
# Pod with init and regular containers, only init uses private registry
apiVersion: v1
kind: Pod
metadata:
  name: pod-init-private-only
spec:
  initContainers:
    - name: setup
      image: my-registry-proxy.example.com/setup:v1
  containers:
    - name: app
      image: nginx:latest
---
# Pod with multiple private registry images and init containers
apiVersion: v1
kind: Pod
metadata:
  name: pod-complex-private
spec:
  initContainers:
    - name: init1
      image: my-registry-proxy.example.com/init1:v1
    - name: init2
      image: my-registry-proxy.example.com/init2:v1
  containers:
    - name: container1
      image: my-registry-proxy.example.com/app1:v1
    - name: container2
      image: my-registry-proxy.example.com/app2:v1
    - name: container3
      image: nginx:latest
    - name: container4
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/web:v1