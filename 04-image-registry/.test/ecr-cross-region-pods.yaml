---
# ECR image from us-east-1 running in eu-west-1 cluster
apiVersion: v1
kind: Pod
metadata:
  name: ecr-cross-region-basic
spec:
  containers:
    - name: my-app
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/my-app:v1
---
# ECR image from us-west-2 with different registry ID
apiVersion: v1
kind: Pod
metadata:
  name: ecr-cross-region-different-account
spec:
  containers:
    - name: app
      image: 111111111111.dkr.ecr.us-west-2.amazonaws.com/other-app:latest
---
# ECR image with digest instead of tag
apiVersion: v1
kind: Pod
metadata:
  name: ecr-cross-region-digest
spec:
  containers:
    - name: app
      image: 000000000000.dkr.ecr.ap-northeast-1.amazonaws.com/my-service@sha256:eece025e432126ce23f223450a0326fbebde39cdf496ea279c5c3ea2882146ad
---
# ECR image with nested repository path
apiVersion: v1
kind: Pod
metadata:
  name: ecr-cross-region-nested
spec:
  containers:
    - name: app
      image: 000000000000.dkr.ecr.ca-central-1.amazonaws.com/team/service/app:v2.0
---
# ECR image with no tag (should default to latest)
apiVersion: v1
kind: Pod
metadata:
  name: ecr-cross-region-no-tag
spec:
  containers:
    - name: app
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/my-app
---
# Pod with multiple containers from different regions
apiVersion: v1
kind: Pod
metadata:
  name: ecr-multi-region-containers
spec:
  containers:
    - name: frontend
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/frontend:v1
    - name: backend
      image: 111111111111.dkr.ecr.eu-central-1.amazonaws.com/backend:v2
    - name: database
      image: 000000000000.dkr.ecr.ap-southeast-1.amazonaws.com/postgres:latest
---
# Pod mixing ECR cross-region and GHCR images (both policies should apply)
apiVersion: v1
kind: Pod
metadata:
  name: ecr-and-github-mixed
spec:
  containers:
    - name: ecr-app
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/team/service:v1
    - name: github-app
      image: ghcr.io/my-org/my-app:v2
    - name: github-worker
      image: ghcr.io/my-org/worker:latest
---
# Pod with initContainers from different region
apiVersion: v1
kind: Pod
metadata:
  name: ecr-init-containers
spec:
  initContainers:
    - name: init-setup
      image: 000000000000.dkr.ecr.us-west-1.amazonaws.com/init-script:v1
  containers:
    - name: main-app
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/app:v1
---
# Pod with initContainers and multiple containers from different regions
apiVersion: v1
kind: Pod
metadata:
  name: ecr-init-and-multi
spec:
  initContainers:
    - name: migration
      image: 000000000000.dkr.ecr.sa-east-1.amazonaws.com/db-migrate:v1
  containers:
    - name: web
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/web:v1
    - name: api
      image: 000000000000.dkr.ecr.eu-west-1.amazonaws.com/api:v1
---
# ECR image from same region (should NOT mutate)
apiVersion: v1
kind: Pod
metadata:
  name: ecr-same-region
spec:
  containers:
    - name: app
      image: 000000000000.dkr.ecr.eu-west-1.amazonaws.com/my-app:v1
---
# ECR image with ecr-private/ prefix already set (should NOT mutate - ignored prefix)
apiVersion: v1
kind: Pod
metadata:
  name: ecr-private-prefix-exists
spec:
  containers:
    - name: app
      image: 000000000000.dkr.ecr.us-east-1.amazonaws.com/ecr-private/my-app:v1

