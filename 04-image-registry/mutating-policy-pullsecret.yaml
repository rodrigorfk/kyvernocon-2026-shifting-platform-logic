# Migrated from: ClusterPolicy (kyverno.io/v1) rules "add-imagepullsecret-containers"
# and "add-imagepullsecret-init-containers" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/04-image-registry
#
# This policy adds imagePullSecrets to pods that use images from a private
# registry proxy (my-registry-proxy.example.com).
#
# Key migration changes:
#   - patchStrategicMerge with conditional anchor <(image) → matchConditions + ApplyConfiguration
#   - Separate rules for containers/initContainers → single matchCondition checking both
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-imagepullsecret-injection
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  matchConditions:
    # Only add imagePullSecrets if the pod uses images from the private registry proxy
    - name: has-private-registry-image
      expression: >-
        object.spec.containers.exists(c,
          c.image.startsWith("my-registry-proxy.example.com/")
        ) ||
        (
          has(object.spec.initContainers) &&
          object.spec.initContainers.exists(c,
            c.image.startsWith("my-registry-proxy.example.com/")
          )
        )
  mutations:
    - patchType: ApplyConfiguration
      applyConfiguration:
        expression: >-
          Object{
            spec: Object.spec{
              imagePullSecrets: [
                Object.spec.imagePullSecrets{
                  name: "registry-proxy-private-key"
                }
              ]
            }
          }
