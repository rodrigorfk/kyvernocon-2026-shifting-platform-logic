# Migrated from: ClusterPolicy (kyverno.io/v1) → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/03-pod-hardware-arch
#
# This policy automatically assigns a default hardware architecture (nodeSelector)
# to newly created pods when not explicitly specified. The default architecture
# is read from the namespace label "policies.kyverno.io/default-arch", falling
# back to "arm64".
#
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: mutate-pod-hardware-arch
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["pods"]
        operations: ["CREATE"]
  variables:
    # Load the centralized Prometheus server address from the ConfigMap
    - name: namespaceObject
      expression: >-
        resource.Get("v1", "namespaces", "", object.metadata.namespace)
    - name: namespaceLabels
      expression: >-
        has(variables.namespaceObject.metadata.labels)
        ? variables.namespaceObject.metadata.labels
        : {}
    # Read the default architecture from the namespace label, falling back to "arm64"
    - name: defaultArch
      expression: >-
        "policies.kyverno.io/default-arch" in variables.namespaceLabels
        ? variables.namespaceLabels["policies.kyverno.io/default-arch"]
        : "arm64"
  matchConditions:
    # Exclude namespaces that have opted out of default arch enforcement
    - name: not-disabled-namespace
      expression: >-
        !(variables.namespaceLabels.exists(k, k == "policies.kyverno.io/disable-default-arch-enforcement")) ||
        variables.namespaceLabels["policies.kyverno.io/disable-default-arch-enforcement"] != "true"
    # Do not mutate pods owned by DaemonSets (they typically need to run on all architectures)
    - name: not-daemonset-owned
      expression: >-
        !has(object.metadata.ownerReferences) ||
        object.metadata.ownerReferences.size() == 0 ||
        !object.metadata.ownerReferences.exists(ref, ref.kind == "DaemonSet")
    # Only mutate if no architecture is already specified in nodeSelector
    - name: no-arch-in-nodeselector
      expression: >-
        !has(object.spec.nodeSelector) ||
        !("kubernetes.io/arch" in object.spec.nodeSelector)
    # Only mutate if no architecture is already specified in affinity
    # We check the requiredDuringSchedulingIgnoredDuringExecution and
    # preferredDuringSchedulingIgnoredDuringExecution fields explicitly
    - name: no-arch-in-affinity
      expression: >-
        !has(object.spec.affinity) ||
        !has(object.spec.affinity.nodeAffinity) ||
        (
          (
            !has(object.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution) ||
            !object.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms.exists(term,
              term.matchExpressions.exists(expr, expr.key == "kubernetes.io/arch")
            )
          ) &&
          (
            !has(object.spec.affinity.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution) ||
            !object.spec.affinity.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution.exists(pref,
              pref.preference.matchExpressions.exists(expr, expr.key == "kubernetes.io/arch")
            )
          )
        )
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          has(object.spec.nodeSelector)
          ? [
              JSONPatch{
                op: "add",
                path: "/spec/nodeSelector/kubernetes.io~1arch",
                value: string(variables.defaultArch)
              }
            ]
          : [
              JSONPatch{
                op: "add",
                path: "/spec/nodeSelector",
                value: {
                  "kubernetes.io/arch": string(variables.defaultArch)
                }
              }
            ]