# Test resource - apply this pod to test the mutating policy
# First create the namespace with the default arch label:
#   kubectl create namespace test-arch
#   kubectl label namespace test-arch policies.kyverno.io/default-arch=arm64
# Then apply and verify:
#   kubectl apply -f test-pod.yaml
#   kubectl get pod test-pod -n test-arch -o jsonpath='{.spec.nodeSelector}'
---
apiVersion: v1
kind: Pod
metadata:
  name: test-pod
  namespace: test-arch
spec:
  containers:
    - name: nginx
      image: nginx
