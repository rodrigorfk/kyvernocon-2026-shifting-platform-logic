# Migrated from: ClusterPolicy (kyverno.io/v1) rule "scaled-object" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/02-keda-prometheus-address
#
# Access Pattern 1: When a ScaledObject is created or updated with the opt-in
# annotation, this policy reads the centralized Prometheus server address from
# a ConfigMap and patches it into all prometheus-type triggers.
#
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: keda-prometheus-serveraddress-scaledobject
spec:
  matchConstraints:
    resourceRules:
      - apiGroups: ["keda.sh"]
        apiVersions: ["v1alpha1"]
        resources: ["scaledobjects"]
        operations: ["CREATE", "UPDATE"]
  matchConditions:
    # Only apply to ScaledObjects that opt-in via annotation
    - name: opt-in-annotation
      expression: >-
        has(object.metadata.annotations) &&
        "prometheus.keda.sh/use-central-serveraddress" in object.metadata.annotations &&
        object.metadata.annotations["prometheus.keda.sh/use-central-serveraddress"] == "true"
    - name: has-server-address-triggers
      expression: >-
        variables.serverAddress != ""
  variables:
    # Load the centralized Prometheus server address from the ConfigMap
    - name: serverAddressCM
      expression: >-
        resource.Get("v1", "configmaps", "observability", "keda-prometheus-serveraddress")
    - name: serverAddress
      expression: >-
        has(variables.serverAddressCM) && has(variables.serverAddressCM.data) && "main" in variables.serverAddressCM.data
        ? string(variables.serverAddressCM.data["main"])
        : ""
  mutations:
    # Iterate over triggers, filter for prometheus type, and patch the serverAddress
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          object.spec.triggers.filter(e,
            has(e.type) && e.type == "prometheus"
          ).map(e,
            JSONPatch{
              op: "replace",
              path: "/spec/triggers/" + string(object.spec.triggers.indexOf(e)) + "/metadata/serverAddress",
              value: string(variables.serverAddress)
            }
          )
