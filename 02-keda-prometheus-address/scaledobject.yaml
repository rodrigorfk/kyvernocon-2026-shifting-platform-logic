# Test resource - KEDA ScaledObject with the opt-in annotation
# Apply this to test that the serverAddress gets replaced by the policy:
#   kubectl create namespace observability
#   kubectl apply -f scaledobject.yaml
#   kubectl get scaledobject prometheus-scaledobject -o yaml
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: prometheus-scaledobject
  annotations:
    keda.prometheus.sh/use-central-serveraddress: "true"
spec:
  scaleTargetRef:
    name: my-deployment
  triggers:
    - type: prometheus
      metadata:
        serverAddress: "http://my-prometheus.example.com:9090"
        query: sum(rate(http_requests_total{job="app"}[2m]))
