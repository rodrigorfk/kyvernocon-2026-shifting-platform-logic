# Migrated from: ClusterPolicy (kyverno.io/v1) rule "configmap" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/02-keda-prometheus-address
#
# Access Pattern 2: When the centralized ConfigMap holding the Prometheus address
# is created or updated, this policy propagates the new address to ALL existing
# ScaledObjects that have opted in via annotation.
#
# Key migration changes:
#   - mutate.targets (cross-resource) → background mutation with evaluation.background.enabled
#   - target.metadata.annotations precondition → matchConditions on target resources
#   - foreach over target.spec.triggers → CEL enumerate().filter().map()
#   - request.object.data.main → object.data["main"] (ConfigMap is the trigger)
#
# TODO: verify against Kyverno v1.17 - the exact mechanism for background
# cross-resource mutation (trigger=ConfigMap, target=ScaledObject) in the new
# MutatingPolicy CRD needs validation. The legacy "mutate.targets" pattern
# may map differently in the new API.
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: keda-prometheus-serveraddress-configmap
spec:
  evaluation:
    background:
      enabled: true
      targets:
        # TODO: verify this targets syntax against Kyverno v1.17 docs
        # The intent is: when the ConfigMap changes, find and mutate ScaledObjects
        resourceRules:
          - apiGroups: ["keda.sh"]
            apiVersions: ["v1alpha1"]
            resources: ["scaledobjects"]
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["configmaps"]
        operations: ["CREATE", "UPDATE"]
  matchConditions:
    # Only trigger when the specific ConfigMap is modified
    - name: is-target-configmap
      expression: >-
        object.metadata.name == "keda-prometheus-serveraddress" &&
        object.metadata.namespace == "observability"
  variables:
    - name: serverAddress
      expression: >-
        object.data["main"]
  mutations:
    # TODO: verify - in background mutation, "target" represents each ScaledObject
    # being mutated, while "object" is the triggering ConfigMap.
    # The filter ensures we only patch ScaledObjects that opted in.
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          target.metadata.annotations.exists(k,
            k == "keda.prometheus.sh/use-central-serveraddress"
          ) && target.metadata.annotations["keda.prometheus.sh/use-central-serveraddress"] == "true"
          ? target.spec.triggers.enumerate().filter(e,
              has(e.value.type) && e.value.type == "prometheus"
            ).map(e,
              {
                "op": "replace",
                "path": "/spec/triggers/" + string(e.index) + "/metadata/serverAddress",
                "value": variables.serverAddress
              }
            )
          : []
