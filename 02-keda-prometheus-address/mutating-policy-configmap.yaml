# Migrated from: ClusterPolicy (kyverno.io/v1) rule "configmap" → MutatingPolicy (policies.kyverno.io/v1)
# Original: https://github.com/rodrigorfk/k8s-kyverno-mutating-policies/tree/main/src/examples/02-keda-prometheus-address
#
# Access Pattern 2: When the centralized ConfigMap holding the Prometheus address
# is created or updated, this policy propagates the new address to ALL existing
# ScaledObjects that have opted in via annotation.
#
#
---
apiVersion: policies.kyverno.io/v1
kind: MutatingPolicy
metadata:
  name: keda-prometheus-serveraddress-configmap
spec:
  evaluation:
    mutateExisting:
      enabled: true
  matchConstraints:
    resourceRules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        resources: ["configmaps"]
        operations: ["CREATE", "UPDATE"]
    namespaceSelector:
      matchLabels:
        kubernetes.io/metadata.name: observability
  targetMatchConstraints:
    resourceRules:
      - apiGroups: ["keda.sh"]
        apiVersions: ["v1alpha1"]
        resources: ["scaledobjects"]
  variables:
    - name: serverAddress
      expression: >-
        request.object.data["main"]
    - name: configMapName
      expression: >-
        request.object.metadata.name
  mutations:
    - patchType: JSONPatch
      jsonPatch:
        expression: >-
          has(object.metadata.annotations)
          && variables.configMapName == "keda-prometheus-serveraddress"
          && object.metadata.annotations.exists(k,
            k == "prometheus.keda.sh/use-central-serveraddress"
          ) 
          && object.metadata.annotations["prometheus.keda.sh/use-central-serveraddress"] == "true"
          ? object.spec.triggers.filter(e,
              has(e.type) && e.type == "prometheus"
            ).map(e,
              JSONPatch{
                op: "replace",
                path: "/spec/triggers/" + string(object.spec.triggers.indexOf(e)) + "/metadata/serverAddress",
                value: string(variables.serverAddress)
              }
            )
          : []

