# HTTPRoute — argocd.127.0.0.1.nip.io -> argocd-server:80
# Attaches to the shared "playground" Gateway in envoy-gateway-system.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd
  namespace: argocd
spec:
  parentRefs:
    - name: playground
      namespace: envoy-gateway-system
  hostnames:
    - "argocd.127.0.0.1.nip.io"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
